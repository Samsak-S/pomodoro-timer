spring.datasource.url=jdbc:h2:mem:testdb
spring.jpa.hibernate.ddl-auto=create-drop
# Set to true only for local debugging (SQL and parameters may appear in logs).
spring.jpa.show-sql=false
# Prefer overriding via environment variable in real deployments.
jwt.secret=${JWT_SECRET:your-very-long-and-secure-random-string-that-nobody-knows}
jwt.expiration=86400000